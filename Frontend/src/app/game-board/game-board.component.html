<div class="battleship-container">
  <div class="grid">
    <!-- Loop through 10 rows -->
    <div *ngFor="let row of [].constructor(10); let i = index" class="row">
      <!-- Loop through 10 columns per row -->
      <div *ngFor="let col of [].constructor(10); let j = index" 
           class="cell" 
           (click)="fireShot(i, j)"
           [ngClass]="getCellClass(i, j)">
      </div>
    </div>
  </div>
</div>
